# ── Console e I/O ─────────────────────────────────────────────
CONFIG_STDOUT_CONSOLE=y
CONFIG_PRINTK=y
CONFIG_EARLY_CONSOLE=y

# ── Threads ────────────────────────────────────────────────────
# Nomes para identificação nos logs
CONFIG_THREAD_NAME=y
CONFIG_THREAD_MONITOR=y

# ── Escalonamento ──────────────────────────────────────────────
# Preempção habilitada (necessário para demonstrar inversão)
CONFIG_PREEMPT_ENABLED=y

# Sem timeslicing: escalonamento puramente por prioridade, sem round-robin
# Garante comportamento determinístico e facilita análise
CONFIG_TIMESLICING=n

# Número de níveis de prioridade preemptiva (0 = mais alta, N-1 = mais baixa)
CONFIG_NUM_PREEMPT_PRIORITIES=16

# ── Resolução do relógio ───────────────────────────────────────
# 10 kHz → resolução de 100 µs por tick
# Suficiente para medir jitter de T1 (período 100 ms) com granularidade útil
CONFIG_SYS_CLOCK_TICKS_PER_SEC=10000

# ── Logging desativado para saída limpa (CSV via printk) ──────
CONFIG_LOG=n
